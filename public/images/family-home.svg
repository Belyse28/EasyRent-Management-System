<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="150" fill="url(#skyGrad4)"/>
  
  <!-- Ground -->
  <rect y="150" width="400" height="150" fill="#90EE90"/>
  
  <!-- Main house -->
  <rect x="80" y="110" width="240" height="140" fill="#F0E68C" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Roof -->
  <polygon points="60,110 200,50 340,110" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  
  <!-- Garage -->
  <rect x="320" y="150" width="60" height="100" fill="#D3D3D3" stroke="#A9A9A9" stroke-width="2"/>
  
  <!-- Garage door -->
  <rect x="330" y="200" width="40" height="50" fill="#696969" stroke="#2F4F4F" stroke-width="1"/>
  
  <!-- Main door -->
  <rect x="160" y="190" width="50" height="60" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <circle cx="195" cy="220" r="3" fill="#FFD700"/>
  
  <!-- Windows -->
  <rect x="100" y="140" width="35" height="30" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  <rect x="220" y="140" width="35" height="30" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  <rect x="265" y="140" width="35" height="30" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  
  <!-- Chimney -->
  <rect x="280" y="70" width="25" height="60" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  
  <!-- Garden -->
  <circle cx="40" cy="200" r="30" fill="#228B22"/>
  <rect x="35" y="200" width="10" height="35" fill="#8B4513"/>
  
  <!-- Fence -->
  <rect x="10" y="220" width="5" height="25" fill="#8B4513"/>
  <rect x="25" y="220" width="5" height="25" fill="#8B4513"/>
  <rect x="40" y="220" width="5" height="25" fill="#8B4513"/>
  <rect x="55" y="220" width="5" height="25" fill="#8B4513"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" fill="#2F4F4F" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Family Home</text>
</svg>