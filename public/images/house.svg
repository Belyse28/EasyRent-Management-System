<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="150" fill="url(#skyGrad2)"/>
  
  <!-- Ground -->
  <rect y="150" width="400" height="150" fill="#90EE90"/>
  
  <!-- House base -->
  <rect x="100" y="120" width="200" height="130" fill="#DEB887" stroke="#8B7355" stroke-width="2"/>
  
  <!-- Roof -->
  <polygon points="80,120 200,60 320,120" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  
  <!-- Door -->
  <rect x="170" y="190" width="60" height="60" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <circle cx="215" cy="220" r="3" fill="#FFD700"/>
  
  <!-- Windows -->
  <rect x="120" y="140" width="40" height="30" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  <rect x="240" y="140" width="40" height="30" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  
  <!-- Chimney -->
  <rect x="260" y="80" width="20" height="50" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  
  <!-- Trees -->
  <circle cx="50" cy="180" r="25" fill="#228B22"/>
  <rect x="45" y="180" width="10" height="30" fill="#8B4513"/>
  
  <circle cx="350" cy="190" r="20" fill="#228B22"/>
  <rect x="345" y="190" width="10" height="25" fill="#8B4513"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" fill="#2F4F4F" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Cozy House</text>
</svg>