<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="150" fill="url(#skyGrad3)"/>
  
  <!-- Ground -->
  <rect y="150" width="400" height="150" fill="#90EE90"/>
  
  <!-- Building -->
  <rect x="120" y="100" width="160" height="150" fill="#F5DEB3" stroke="#D2B48C" stroke-width="2"/>
  
  <!-- Windows -->
  <rect x="140" y="130" width="30" height="25" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
