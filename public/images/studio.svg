  <rect x="240" y="130" width="30" height="25" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  
  <!-- Door -->
  <rect x="180" y="200" width="40" height="50" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <circle cx="210" cy="225" r="2" fill="#FFD700"/>
  
  <!-- Balcony -->
  <rect x="130" y="170" width="140" height="20" fill="#D2B48C" stroke="#A0522D" stroke-width="1"/>
  <rect x="130" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="145" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="160" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="175" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="190" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="205" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="220" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="235" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="250" y="170" width="5" height="15" fill="#A0522D"/>
  <rect x="265" y="170" width="5" height="15" fill="#A0522D"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" fill="#2F4F4F" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Studio Apartment</text>
